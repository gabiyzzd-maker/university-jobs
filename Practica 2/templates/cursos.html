{% extends "base.html" %}
{% block contenido %}
<h2>Cursos</h2>
<form method="POST" action="/cursos/agregar">
    <input type="text" name="nombre" placeholder="Nombre del curso" required>
    <input type="number" name="creditos" placeholder="Créditos" required>
    <button type="submit">Agregar</button>
</form>
<table border="1">
    <tr><th>ID</th><th>Nombre</th><th>Créditos</th><th>Acciones</th></tr>
    {% for c in cursos %}
    <tr>
        <td>{{ c[0] }}</td>
        <td>{{ c[1] }}</td>
        <td>{{ c[2] }}</td>
        <td><a href="/cursos/eliminar/{{ c[0] }}"
               onclick="return confirm('¿Eliminar?')">Eliminar</a></td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
